name: daily_muse
description: daily muse est une application mobile pour les amoureux des mots et de la culture générale ,l'application propose chaque jour une énigme basé que sur la culture ivoirienne et des citations motivantes.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # Network
  http: ^1.1.0
  
  # Icons
  phosphor_flutter: ^2.0.0
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # Animations
  flutter_animate: ^4.2.0

  # SVG Support
  flutter_svg: ^2.0.10+1
  
  # Fonts
  google_fonts: ^6.1.0
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  share_plus: ^10.1.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: false

  assets:
    - assets/images/
